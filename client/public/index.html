<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <!-- Mobile-optimized viewport configuration -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="Blockfolio Pro - Professional Cryptocurrency Trading Platform by Lazy Coder" />
    
    <!-- Mobile web app capabilities -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Blockfolio Pro" />
    
    <!-- Prevent automatic phone number detection -->
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Optimize for touch -->
    <meta name="HandheldFriendly" content="true" />
    
    <!-- Critical resource preloading for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    
    <!-- Preload critical CSS -->
    <link rel="preload" href="%PUBLIC_URL%/critical.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    
    <!-- Preload critical API endpoints -->
    <link rel="prefetch" href="/api/coins/prices">
    <link rel="prefetch" href="/api/wallet">
    <link rel="prefetch" href="/api/market/global">
    
    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="//api.coingecko.com">
    
    <!-- Critical CSS inline for immediate rendering -->
    <style>
      /* Minimal critical styles for immediate rendering */
      body { 
        margin: 0; 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif; 
        background-color: #f8fafc;
      }
      .min-h-screen { min-height: 100vh; }
      .flex { display: flex; }
      .items-center { align-items: center; }
      .justify-center { justify-content: center; }
      .animate-spin { animation: spin 1s linear infinite; }
      .rounded-full { border-radius: 9999px; }
      .h-12 { height: 3rem; }
      .w-12 { width: 3rem; }
      .border-b-2 { border-bottom-width: 2px; }
      .border-fintech-brand-600 { border-color: #3b82f6; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      
      /* Loading skeleton */
      .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      .bg-gray-200 { background-color: #e5e7eb; }
      .rounded-lg { border-radius: 0.5rem; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
    
    <title>Blockfolio Pro - Professional Trading Platform</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Performance monitoring script -->
    <script>
      // Track initial page load performance
      window.addEventListener('load', function() {
        if ('performance' in window) {
          const navigation = performance.getEntriesByType('navigation')[0];
          const loadTime = navigation.loadEventEnd - navigation.fetchStart;
          
          // Log performance metrics
          console.log('Performance Metrics:', {
            loadTime: loadTime + 'ms',
            domContentLoaded: (navigation.domContentLoadedEventEnd - navigation.fetchStart) + 'ms',
            firstPaint: performance.getEntriesByType('paint').find(entry => entry.name === 'first-paint')?.startTime + 'ms',
            firstContentfulPaint: performance.getEntriesByType('paint').find(entry => entry.name === 'first-contentful-paint')?.startTime + 'ms'
          });
          
          // Check 2-second requirement
          if (loadTime <= 2000) {
            console.log('✅ Load time requirement met:', loadTime + 'ms');
          } else {
            console.warn('⚠️ Load time exceeds 2s requirement:', loadTime + 'ms');
          }
          
          // Send to analytics if available
          if (window.gtag) {
            window.gtag('event', 'page_load_time', {
              value: Math.round(loadTime),
              custom_parameter: 'initial_load'
            });
          }
        }
      });
      
      // Track largest contentful paint
      if ('PerformanceObserver' in window) {
        const observer = new PerformanceObserver((list) => {
          const entries = list.getEntries();
          const lastEntry = entries[entries.length - 1];
          console.log('LCP:', lastEntry.startTime + 'ms');
        });
        observer.observe({ entryTypes: ['largest-contentful-paint'] });
      }
    </script>
  </body>
</html>
