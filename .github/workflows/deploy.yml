name: Deploy CoinNova Trading Platform

on:
  push:
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production

env:
  NODE_VERSION: '18.x'

jobs:
  # Determine environment based on branch or manual input
  setup:
    name: Setup Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Determine Environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
          fi

  # Run tests and validation
  test:
    name: Test and Validate
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci
          cd server && npm ci
          cd ../client && npm ci

      - name: Validate Configuration
        env:
          NODE_ENV: ${{ needs.setup.outputs.environment }}
        run: |
          node -e "require('./server/config/env.config').initializeConfig()"

      - name: Run Linting
        run: |
          cd client && npm run lint || true

      - name: Run Unit Tests
        run: |
          cd client && CI=true npm test -- --coverage --watchAll=false

      - name: Upload Test Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./client/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  # Build application
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [setup, test]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci
          cd server && npm ci
          cd ../client && npm ci

      - name: Build Client
        env:
          NODE_ENV: ${{ needs.setup.outputs.environment }}
          REACT_APP_API_URL: ${{ secrets[format('{0}_API_URL', needs.setup.outputs.environment)] }}
          REACT_APP_COINGECKO_API_URL: https://api.coingecko.com/api/v3
        run: |
          cd client && npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-${{ needs.setup.outputs.environment }}
          path: client/build
          retention-days: 7

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate || true
          cd server && npm audit --audit-level=moderate || true
          cd ../client && npm audit --audit-level=moderate || true

      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # Deploy to environment
  deploy:
    name: Deploy to ${{ needs.setup.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [setup, test, build, security]
    environment:
      name: ${{ needs.setup.outputs.environment }}
      url: ${{ secrets[format('{0}_URL', needs.setup.outputs.environment)] }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-${{ needs.setup.outputs.environment }}
          path: client/build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Server
        env:
          DEPLOY_HOST: ${{ secrets[format('{0}_DEPLOY_HOST', needs.setup.outputs.environment)] }}
          DEPLOY_USER: ${{ secrets[format('{0}_DEPLOY_USER', needs.setup.outputs.environment)] }}
          DEPLOY_PATH: ${{ secrets[format('{0}_DEPLOY_PATH', needs.setup.outputs.environment)] }}
        run: |
          # Create deployment package
          tar -czf deploy.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=client/node_modules \
            --exclude=server/node_modules \
            .

          # Copy to server
          scp -o StrictHostKeyChecking=no deploy.tar.gz ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/

          # Extract and deploy
          ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} << 'EOF'
            cd ${DEPLOY_PATH}
            tar -xzf deploy.tar.gz
            chmod +x scripts/*.sh
            ./scripts/deploy.sh ${{ needs.setup.outputs.environment }}
          EOF

      - name: Run Health Check
        env:
          HEALTH_CHECK_URL: ${{ secrets[format('{0}_URL', needs.setup.outputs.environment)] }}
        run: |
          for i in {1..10}; do
            if curl -f -s "${HEALTH_CHECK_URL}/api/health" > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for application... ($i/10)"
            sleep 10
          done
          echo "Health check failed"
          exit 1

  # Notify deployment status
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [setup, deploy]
    if: always()
    steps:
      - name: Send Slack Notification
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: |
            Deployment to ${{ needs.setup.outputs.environment }} ${{ job.status }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Create GitHub Deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: ${{ needs.setup.outputs.environment }}
          deployment-status: ${{ job.status }}
